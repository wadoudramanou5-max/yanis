<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire HTML</title>
    <link rel="stylesheet" href="formulaire.css">
</head>
<body>
<div class="page">

    <div class="page-header">
        <div class="icone-page">📝</div>
        <div>
            <h1>Formulaire de contact</h1>
            <div class="sous">form · input · select · textarea · radio · checkbox</div>
        </div>
    </div>

    <form action="#" method="post">

        <!-- Coordonnées -->
        <div class="form-section">
            <h2> Vos coordonnées</h2>
            <div class="grille-2">
                <div class="champ">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" name="nom" placeholder="Ex : OGOUGBE" />
                </div>
                <div class="champ">
                    <label for="prenom">Prénom *</label>
                    <input type="text" id="prenom" name="prenom" placeholder="Ex : Yanis" />
                </div>
            </div>
            <div class="champ">
                <label for="email">Adresse e-mail *</label>
                <input type="email" id="email" name="email" placeholder="Ex : yanis@email.com" />
            </div>
            <div class="grille-2">
                <div class="champ">
                    <label for="tel">Téléphone</label>
                    <input type="tel" id="tel" name="tel" placeholder="+229 XX XX XX XX" />
                </div>
                <div class="champ">
                    <label for="age">Date de naissance</label>
                    <input type="date" id="age" name="age" />
                </div>
            </div>
            <div class="champ">
                <label for="filiere">Filière</label>
                <select id="filiere" name="filiere">
                    <option value="">-- Choisir --</option>
                    <option value="ig">Informatique de Gestion (IG)</option>
                    <option value="mi">Mathématiques-Informatique (MI)</option>
                    <option value="autre">Autre</option>
                </select>
            </div>
        </div>

        <!-- Souhait -->
        <div class="form-section">
            <h2> Votre souhait</h2>
            <div class="radio-groupe">
                <label class="radio-item">
                    <input type="radio" name="souhait" value="riche" />
                     Être riche
                </label>
                <label class="radio-item">
                    <input type="radio" name="souhait" value="celebre" />
                     Être célèbre
                </label>
                <label class="radio-item">
                    <input type="radio" name="souhait" value="intelligent" />
                     Être encore plus intelligent
                </label>
                <label class="radio-item">
                    <input type="radio" name="souhait" value="autre" />
                    Autre...
                </label>
            </div>
             <div class="form-section">
            <div class="champ">
                <label for="message">Votre souhait</label>
                <textarea id="message" name="message" placeholder="Écrivez  ici..."></textarea>
            </div>
        </div>
        </div>

        <!-- Centres d'intérêt -->
        <div class="form-section">
            <h2> Centres d'intérêt</h2>
            <div class="check-groupe">
                <label class="check-item">
                    <input type="checkbox" name="interet" value="info" />
                    Informatique
                </label>
                <label class="check-item">
                    <input type="checkbox" name="interet" value="maths" />
                    Mathématiques
                </label>
                <label class="check-item">
                    <input type="checkbox" name="interet" value="litterature" />
                     Littérature
                </label>
                <label class="check-item">
                    <input type="checkbox" name="interet" value="sport" />
                    Sport
                </label>
            </div>
        </div>

        <!-- Message -->
        <div class="form-section">
            <h2> Message</h2>
            <div class="champ">
                <label for="message">Votre message</label>
                <textarea id="message" name="message" placeholder="Écrivez votre message ici..."></textarea>
            </div>
        </div>

        <!-- Boutons -->
        <div class="boutons">
            <button type="submit" class="btn-envoyer">✉ Envoyer le formulaire</button>
            <button type="reset" class="btn-reset"> Réinitialiser</button>
        </div>

    </form>

</div>
</body>
</html>
